<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Login</title>

<style>
body {
    background: linear-gradient(to right, #5f2c82, #8a4fff);
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    font-size: larger;
}

/* Card style */
.login-box {
    background: #ffffff;
    padding: 30px;
    border-radius: 15px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Inputs */
.form-control {
    border-radius: 10px;
    text-align: center;
    border: 1px solid #ccc;
}

.form-control:focus {
    border-color: #8a4fff;
    box-shadow: 0 0 5px rgba(138, 79, 255, 0.5);
}

/* Buttons */
.btn-primary {
    background-color: #8a4fff;
    border: none;
}

.btn-primary:hover {
    background-color: #6f3de0;
}

.btn {
    border-radius: 10px;
    width: 45%;
}

/* Title */
.title {
    font-weight: bold;
    font-size: 28px;
    color: #5f2c82;
}

/* Small text */
small {
    color: gray;
}
</style>
</head>

<body>

<div class="login-box text-center">
    
    <img src="https://cdn-icons-png.flaticon.com/512/6681/6681204.png" width="50">
    <p class="title mt-2">Login</p>

    <form onsubmit="authenticate(); return false;">
        
        <label><small>Username</small></label>
        <input type="text" id="uname" class="form-control mb-3" placeholder="Enter username" required>

        <label><small>Password</small></label>
        <input type="password" id="pwd" class="form-control mb-3" placeholder="Enter password" required>

        <div class="form-check text-start mb-2">
            <input type="checkbox" id="stay" class="form-check-input" onclick="checklog()">
            <label class="form-check-label">Stay logged in</label>
        </div>

        <p id="logged_in" class="text-muted fst-italic small"></p>

        <div class="d-flex justify-content-between mt-3">
            <input type="submit" value="Login" class="btn btn-primary">
            <input type="reset" value="Cancel" class="btn btn-outline-secondary">
        </div>

        <hr>
        <a href="#" class="text-decoration-none">Forgot username / password?</a>

    </form>

</div>

<script>
function authenticate() {
    var username = document.getElementById('uname').value;
    var pwd = document.getElementById('pwd').value;

    if(username === 'student01' && pwd === '12345678'){
        alert("Welcome " + username + "!");
    } else {
        alert("Incorrect username and/or password.");
    }
}

function checklog() {
    let stay = document.getElementById("stay").checked;

    document.getElementById("logged_in").innerHTML =
        stay ? "Your session will stay active on this device." : "";
}
</script>

</body>
</html>
